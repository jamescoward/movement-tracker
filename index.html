<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Track your baby's movements and build a personal baseline throughout pregnancy." />
  <meta name="theme-color" content="#7a9e87" />

  <title>Baby Movement Tracker</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Movement Tracker</h1>
  </header>

  <main id="main-content">

    <section class="log-section" aria-label="Log a movement">

      <div class="timestamp-group">
        <label for="movement-time">Time</label>
        <input type="time" id="movement-time" name="movement-time" />
      </div>

      <fieldset class="flags-group">
        <legend>Context</legend>
        <div class="flags-grid">
          <button type="button" class="flag-toggle" data-flag="justEaten" aria-pressed="false">Just eaten</button>
          <button type="button" class="flag-toggle" data-flag="crunchedUp" aria-pressed="false">Crunched up</button>
          <button type="button" class="flag-toggle" data-flag="listeningToMusic" aria-pressed="false">Listening to music</button>
          <button type="button" class="flag-toggle" data-flag="resting" aria-pressed="false">Resting</button>
          <button type="button" class="flag-toggle" data-flag="active" aria-pressed="false">Active</button>
        </div>
      </fieldset>

      <div class="notes-group">
        <label for="movement-notes">Notes <span class="label-optional">(optional)</span></label>
        <textarea id="movement-notes" name="notes" placeholder="Any other context…" rows="2"></textarea>
      </div>

      <button type="button" id="log-movement-btn" class="log-btn">Log Movement</button>

    </section>

    <div id="save-toast" class="toast" role="status" aria-live="polite" hidden>Movement logged</div>

    <section class="recent-section" aria-label="Recent movements">
      <h2>Today</h2>
      <ul id="recent-movements" class="movements-list"></ul>
    </section>

  </main>

  <nav aria-label="Main navigation">
    <a href="/" aria-current="page">
      <span aria-hidden="true">📋</span>
      Log
    </a>
    <a href="/chart.html">
      <span aria-hidden="true">📈</span>
      Chart
    </a>
    <a href="/settings.html">
      <span aria-hidden="true">⚙️</span>
      Settings
    </a>
  </nav>

  <script src="app.js"></script>
  <script src="log.js"></script>
</body>
</html>
