<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Track your baby's movements and build a personal baseline throughout pregnancy." />
  <meta name="theme-color" content="#7a9e87" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <title>Baby Movement Tracker</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="splash-screen" id="splash-screen" aria-hidden="true">
    <img src="icons/icon-192.png" alt="" width="80" height="80" />
    <span>Movement Tracker</span>
  </div>

  <header>
    <h1>Movement Tracker</h1>
  </header>

  <main id="main-content">

    <section class="log-section" aria-label="Log a movement">

      <fieldset class="flags-group">
        <legend>Context</legend>
        <div class="flags-grid" id="flags-grid"></div>
      </fieldset>

      <div class="notes-group">
        <label for="movement-notes">Notes <span class="label-optional">(optional)</span></label>
        <textarea id="movement-notes" name="notes" placeholder="Any other context…" rows="2"></textarea>
      </div>

      <button type="button" id="log-movement-btn" class="log-btn">Log Movement</button>

    </section>

    <div id="offline-banner" class="offline-banner" role="status" aria-live="polite" hidden>
    You are offline — data is saved locally
  </div>

  <div id="save-toast" class="toast" role="status" aria-live="polite" hidden>Movement logged</div>

    <section class="recent-section" aria-label="Recent movements">
      <h2>Today</h2>
      <ul id="recent-movements" class="movements-list"></ul>
    </section>

  </main>

  <button type="button" id="install-btn" class="install-btn" hidden>
    Install App
  </button>

  <nav aria-label="Main navigation">
    <a href="./" aria-current="page">
      <span aria-hidden="true">📋</span>
      Log
    </a>
    <a href="./chart.html">
      <span aria-hidden="true">📈</span>
      Chart
    </a>
    <a href="./week.html">
      <span aria-hidden="true">📊</span>
      Week
    </a>
    <a href="./heatmap.html">
      <span aria-hidden="true">🗓️</span>
      Patterns
    </a>
    <a href="./correlation.html">
      <span aria-hidden="true">🔗</span>
      Flags
    </a>
    <a href="./settings.html">
      <span aria-hidden="true">⚙️</span>
      Settings
    </a>
  </nav>

  <script src="app.js"></script>
  <script src="storage.js"></script>
  <script src="log.js"></script>
</body>
</html>
