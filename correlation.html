<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Flag correlation view — Baby Movement Tracker" />
  <meta name="theme-color" content="#7a9e87" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <title>Flag Correlation — Movement Tracker</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Movement Tracker</h1>
  </header>

  <main id="main-content">

    <section class="correlation-section" aria-label="Flag correlation view">

      <h2 class="section-heading">Flag Breakdown</h2>
      <p class="section-description">How often each flag is present when movements are logged.</p>
      <div id="correlation-breakdown" class="correlation-breakdown"></div>

      <h2 class="section-heading">Hourly Comparison</h2>
      <p class="section-description">Movements per hour — with flag vs. without.</p>

      <div class="correlation-controls">
        <label for="flag-select">Compare flag:</label>
        <select id="flag-select"></select>
      </div>

      <div id="correlation-comparison" class="correlation-comparison"></div>

    </section>

  </main>

  <nav aria-label="Main navigation">
    <a href="./">
      <span aria-hidden="true">📋</span>
      Log
    </a>
    <a href="./chart.html">
      <span aria-hidden="true">📈</span>
      Chart
    </a>
    <a href="./week.html">
      <span aria-hidden="true">📊</span>
      Week
    </a>
    <a href="./heatmap.html">
      <span aria-hidden="true">🗓️</span>
      Patterns
    </a>
    <a href="./correlation.html" aria-current="page">
      <span aria-hidden="true">🔗</span>
      Flags
    </a>
    <a href="./settings.html">
      <span aria-hidden="true">⚙️</span>
      Settings
    </a>
  </nav>

  <script src="app.js"></script>
  <script src="storage.js"></script>
  <script src="correlation.js"></script>
</body>
</html>
